[package]
name = "librashader-runtime-wgpu"
edition = "2021"

version = "0.10.1"
license = "MPL-2.0 OR GPL-3.0-only"
authors = ["Ronny Chan <ronny@ronnychan.ca>"]
repository = "https://github.com/SnowflakePowered/librashader"
readme = "../README.md"
categories = ["emulators", "compilers", "graphics"]
keywords = ["shader", "retroarch", "SPIR-V"]
description = "RetroArch shaders for all."

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
# Vendored bump: only librashader-common needs the local path (it's the
# other half of the wgpu-version patch). The other librashader-* crates
# don't touch wgpu and stay on crates.io unchanged - cargo's
# [patch.crates-io] in the workspace root rewires them as needed.
librashader-common = { path = "../librashader-common", features = ["wgpu"], version = "0.10.1" }
librashader-presets = { version = "0.10.1" }
librashader-preprocess = { version = "0.10.1" }
librashader-pack = { version = "0.10.1" }
librashader-reflect = { version = "0.10.1", features = ["wgsl"], default-features = false }
librashader-runtime = { version = "0.10.1" }
librashader-cache = { version = "0.10.1" }

# Vendored bump: upstream pins wgpu = "28" via the workspace. We need 29
# to share device/queue/texture types with our top-level wgpu 29 stack
# (egui-wgpu 0.34 is wgpu 29). Most of the API delta 28 -> 29 is
# additive; the breaking parts get patched in the source files.
wgpu = { version = "29", default-features = false, features = ["wgsl"] }
thiserror = "2"
bytemuck = { version = "1.14.0", features = ["derive"] }
array-concat = "0.5.2"

[features]
# workaround for docsrs to not build metal-rs.
wgpu_dx12 = ["wgpu/dx12"]
wgpu_metal = ["wgpu/metal"]
wgpu_webgpu = ["wgpu/webgpu"]

stable = ["librashader-reflect/stable"]

[target.'cfg(not(target_arch="wasm32"))'.dependencies]
rayon = "1"

[dev-dependencies]
config = { version = "0.13.4", features = [] }
env_logger = "0.10.1"
raw-window-handle = "0.6.0"
winit = "0.29.10"
pollster = "0.3"
log = "0.4.20"
wgpu = { version = "29", default-features = true }
